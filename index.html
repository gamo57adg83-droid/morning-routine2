<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');
  :root {
    --bg:#0d1b2a; --bg2:#112233; --surface:#1a2e44;
    --orange:#f4831f; --amber:#fbb03b; --warn:#e8455a;
    --white:#f0f4f8; --muted:#6a8ba8; --done:#3db87e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans JP',sans-serif;
    background:var(--bg); color:var(--white);
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .header {
    width:100%; max-width:480px;
    padding:24px 24px 0;
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .header-title { font-size:13px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; }
  .total-time { font-family:'Inter',sans-serif; font-size:13px; color:var(--muted); }

  .main-display {
    width:100%; max-width:480px; padding:0 24px;
    display:flex; flex-direction:column; align-items:center; flex:1;
  }
  .ring-wrap {
    position:relative; width:240px; height:240px; margin:32px auto 24px;
  }
  .ring-svg { width:240px; height:240px; transform:rotate(-90deg); }
  .ring-track { fill:none; stroke:var(--surface); stroke-width:14; }
  .ring-progress {
    fill:none; stroke-width:14; stroke-linecap:round;
    stroke-dasharray:659.7; stroke-dashoffset:0;
    transition:stroke-dashoffset 0.5s linear, stroke 0.4s;
  }
  .ring-center {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  }
  .ring-time {
    font-family:'Inter',sans-serif; font-weight:900; font-size:52px;
    letter-spacing:-0.03em; line-height:1; transition:color 0.4s;
  }
  .ring-label { font-size:12px; color:var(--muted); letter-spacing:0.1em; }

  .step-info { text-align:center; margin-bottom:24px; }
  .step-num { font-size:11px; color:var(--muted); letter-spacing:0.15em; margin-bottom:6px; }
  .step-name { font-size:22px; font-weight:700; letter-spacing:0.02em; margin-bottom:4px; transition:color 0.4s; }
  .step-emoji { font-size:28px; margin-bottom:8px; display:block; }
  .step-duration { font-family:'Inter',sans-serif; font-size:13px; color:var(--muted); }

  @keyframes pulse-ring { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .warn-active .ring-progress { animation:pulse-ring 0.8s ease-in-out infinite; }
  .warn-active .ring-time { color:var(--warn); }
  .warn-active .step-name { color:var(--warn); }

  /* バックグラウンド復帰バナー */
  .sync-banner {
    display:none; position:fixed; top:0; left:0; right:0;
    background:linear-gradient(135deg,var(--orange),var(--amber));
    color:#fff; font-size:13px; font-weight:700;
    padding:14px 20px; padding-top:calc(14px + env(safe-area-inset-top));
    text-align:center; z-index:300;
    animation:slideDown 0.3s ease;
  }
  .sync-banner.show { display:block; }
  @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }

  .controls { display:flex; gap:12px; margin-bottom:28px; }
  .btn {
    border:none; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; font-weight:700; border-radius:50px;
    transition:transform 0.12s; outline:none; -webkit-tap-highlight-color:transparent;
  }
  .btn:active { transform:scale(0.94); }
  .btn-start {
    background:linear-gradient(135deg,var(--orange),var(--amber));
    color:#fff; font-size:16px; padding:16px 52px;
    box-shadow:0 4px 24px rgba(244,131,31,0.35);
  }

  .step-list {
    width:100%; max-width:480px; padding:0 16px 40px;
    display:flex; flex-direction:column; gap:8px;
  }
  .step-item {
    background:var(--bg2); border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; gap:14px;
    border:1.5px solid transparent;
    transition:border-color 0.3s, background 0.3s, opacity 0.3s;
    opacity:0.55;
  }
  .step-item.active { border-color:var(--orange); background:var(--surface); opacity:1; }
  .step-item.done { opacity:0.4; }
  .step-item.done .item-name { text-decoration:line-through; color:var(--muted); }

  .mini-ring-wrap { flex-shrink:0; width:44px; height:44px; position:relative; }
  .mini-svg { width:44px; height:44px; transform:rotate(-90deg); }
  .mini-track { fill:none; stroke:var(--bg); stroke-width:4; }
  .mini-progress {
    fill:none; stroke-width:4; stroke-linecap:round;
    stroke-dasharray:113.1; stroke-dashoffset:113.1;
    transition:stroke-dashoffset 0.5s linear;
  }
  .mini-emoji { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .item-text { flex:1; min-width:0; }
  .item-name { font-size:14px; font-weight:700; margin-bottom:2px; transition:color 0.3s; }
  .item-dur { font-family:'Inter',sans-serif; font-size:11px; color:var(--muted); }
  .item-check {
    width:22px; height:22px; border-radius:50%;
    border:2px solid var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; flex-shrink:0; background:transparent;
    transition:background 0.3s, border-color 0.3s;
  }
  .done .item-check { background:var(--done); border-color:var(--done); }

  .complete-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(13,27,42,0.97);
    flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:100;
  }
  .complete-overlay.show { display:flex; }
  .complete-emoji { font-size:64px; }
  .complete-title { font-size:28px; font-weight:700; }
  .complete-sub { font-size:14px; color:var(--muted); }
  .btn-again {
    margin-top:12px;
    background:linear-gradient(135deg,var(--orange),var(--amber));
    color:#fff; font-size:16px; padding:16px 44px; border-radius:50px;
    border:none; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; font-weight:700;
    -webkit-tap-highlight-color:transparent;
  }
</style>
</head>
<body>

<div class="sync-banner" id="syncBanner">📱 画面復帰 — タイマーを同期しました</div>

<div class="header">
  <div><div class="header-title">Morning Routine</div></div>
  <div class="total-time" id="totalRemain">60:00</div>
</div>

<div class="main-display">
  <div class="ring-wrap" id="ringWrap">
    <svg class="ring-svg" viewBox="0 0 240 240">
      <circle class="ring-track" cx="120" cy="120" r="105"/>
      <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="105" stroke="var(--orange)"/>
    </svg>
    <div class="ring-center">
      <span class="ring-time" id="ringTime">10:00</span>
      <span class="ring-label">残り時間</span>
    </div>
  </div>

  <div class="step-info">
    <div class="step-num" id="stepNum">STEP 1 / 7</div>
    <span class="step-emoji" id="stepEmoji">🚽</span>
    <div class="step-name" id="stepName">トイレ</div>
    <div class="step-duration" id="stepDuration">10分</div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="startTimer()">スタート</button>
  </div>
</div>

<div class="step-list" id="stepList"></div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-emoji">☀️</div>
  <div class="complete-title">準備完了！</div>
  <div class="complete-sub">60分のルーティンをこなしました</div>
  <button class="btn-again" onclick="resetTimer()">もう一度</button>
</div>

<script>
// Service Worker
const SW_CODE = `
const CACHE='morning-v2';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.href])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
`;
if('serviceWorker' in navigator){
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

const STEPS = [
  { name:'トイレ',              emoji:'🚽', dur:10, color:'#6b9fd4' },
  { name:'朝食準備',            emoji:'🍳', dur:5,  color:'#f4831f' },
  { name:'オーブン電源',        emoji:'🔴', dur:3,  color:'#e8455a' },
  { name:'食事',                emoji:'🥪', dur:25, color:'#fbb03b' },
  { name:'歯磨き',              emoji:'🦷', dur:3,  color:'#3db87e' },
  { name:'髭剃り・洗顔・ケア', emoji:'🪥', dur:12, color:'#a076f9' },
  { name:'ロスタイム',          emoji:'⏱️', dur:2,  color:'#6a8ba8' },
];

const TOTAL_SECS = STEPS.reduce((a,s)=>a+s.dur*60, 0); // 3600
const CIRC_LARGE = 2*Math.PI*105;
const CIRC_MINI  = 2*Math.PI*18;
const STORE_KEY  = 'morning_start_ts';

let intervalId = null;
let running    = false;

// ===== 経過秒数から状態を計算 =====
function calcState(elapsedSecs) {
  let rem = Math.max(0, TOTAL_SECS - elapsedSecs);
  let step = 0;
  let acc  = 0;
  for (let i = 0; i < STEPS.length; i++) {
    const dur = STEPS[i].dur * 60;
    if (elapsedSecs < acc + dur) {
      step = i;
      rem  = acc + dur - elapsedSecs;
      break;
    }
    acc += dur;
    if (i === STEPS.length - 1) {
      step = STEPS.length; // 完了
      rem  = 0;
    }
  }
  const totalRem = Math.max(0, TOTAL_SECS - elapsedSecs);
  return { step, rem: Math.ceil(rem), totalRem: Math.ceil(totalRem) };
}

// ===== UI更新 =====
function buildList() {
  const list = document.getElementById('stepList');
  list.innerHTML = '';
  STEPS.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'step-item';
    item.id = `item-${i}`;
    item.innerHTML = `
      <div class="mini-ring-wrap">
        <svg class="mini-svg" viewBox="0 0 44 44">
          <circle class="mini-track" cx="22" cy="22" r="18"/>
          <circle class="mini-progress" id="mini-${i}" cx="22" cy="22" r="18"
            stroke="${s.color}" stroke-dashoffset="${CIRC_MINI}"/>
        </svg>
        <div class="mini-emoji">${s.emoji}</div>
      </div>
      <div class="item-text">
        <div class="item-name">${s.name}</div>
        <div class="item-dur">${s.dur}分</div>
      </div>
      <div class="item-check" id="check-${i}">✓</div>
    `;
    list.appendChild(item);
  });
}

function applyState(step, stepRem, totalRem) {
  // リスト状態
  STEPS.forEach((_, i) => {
    const el = document.getElementById(`item-${i}`);
    if (!el) return;
    el.classList.remove('active','done');
    if (i < step) {
      el.classList.add('done');
      document.getElementById(`mini-${i}`).style.strokeDashoffset = '0';
    } else if (i === step) {
      el.classList.add('active');
      const ratio = stepRem / (STEPS[i].dur * 60);
      document.getElementById(`mini-${i}`).style.strokeDashoffset = CIRC_MINI * (1 - ratio);
    } else {
      document.getElementById(`mini-${i}`).style.strokeDashoffset = CIRC_MINI;
    }
  });

  if (step >= STEPS.length) return;

  // メインリング
  const s     = STEPS[step];
  const ratio = stepRem / (s.dur * 60);
  const ring  = document.getElementById('ringProgress');
  ring.style.strokeDashoffset = CIRC_LARGE * (1 - ratio);
  ring.style.stroke = s.color;

  const m = String(Math.floor(stepRem/60)).padStart(2,'0');
  const sc = String(stepRem%60).padStart(2,'0');
  document.getElementById('ringTime').textContent = `${m}:${sc}`;

  const warn = stepRem <= 60 && running;
  document.getElementById('ringWrap').classList.toggle('warn-active', warn);
  if (warn) ring.style.stroke = 'var(--warn)';

  // ステップ情報
  document.getElementById('stepNum').textContent      = `STEP ${step+1} / ${STEPS.length}`;
  document.getElementById('stepEmoji').textContent    = s.emoji;
  document.getElementById('stepName').textContent     = s.name;
  document.getElementById('stepDuration').textContent = `${s.dur}分`;

  // 総残り時間
  const tm = String(Math.floor(totalRem/60)).padStart(2,'0');
  const ts = String(totalRem%60).padStart(2,'0');
  document.getElementById('totalRemain').textContent = `${tm}:${ts}`;
}

// ===== タイマーループ =====
function tick() {
  const startTs = parseInt(localStorage.getItem(STORE_KEY) || '0');
  if (!startTs) return;
  const elapsed = Math.floor((Date.now() - startTs) / 1000);
  const { step, rem, totalRem } = calcState(elapsed);

  if (step >= STEPS.length) {
    clearInterval(intervalId);
    running = false;
    localStorage.removeItem(STORE_KEY);
    applyState(STEPS.length - 1, 0, 0);
    setTimeout(()=> document.getElementById('completeOverlay').classList.add('show'), 400);
    return;
  }
  applyState(step, rem, totalRem);
}

// ===== 操作 =====
function startTimer() {
  if (running) return;
  // 開始時刻をlocalStorageに保存
  localStorage.setItem(STORE_KEY, Date.now().toString());
  running = true;
  setBtn('pause');
  intervalId = setInterval(tick, 500);
  tick();
}

function pauseTimer() {
  // 一時停止: 残り経過を保存して停止
  const startTs = parseInt(localStorage.getItem(STORE_KEY) || '0');
  const elapsed = Math.floor((Date.now() - startTs) / 1000);
  // elapsed を pausedElapsed として保存、startTsを削除
  localStorage.setItem('morning_paused', elapsed.toString());
  localStorage.removeItem(STORE_KEY);
  clearInterval(intervalId);
  running = false;
  setBtn('resume');
}

function resumeTimer() {
  // 一時停止分を考慮して再開
  const paused = parseInt(localStorage.getItem('morning_paused') || '0');
  const newStart = Date.now() - paused * 1000;
  localStorage.setItem(STORE_KEY, newStart.toString());
  localStorage.removeItem('morning_paused');
  running = true;
  setBtn('pause');
  intervalId = setInterval(tick, 500);
  tick();
}

function resetTimer() {
  clearInterval(intervalId);
  running = false;
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem('morning_paused');
  document.getElementById('completeOverlay').classList.remove('show');
  buildList();
  applyState(0, STEPS[0].dur*60, TOTAL_SECS);
  setBtn('start');
}

function setBtn(mode) {
  const btn = document.getElementById('btnStart');
  if (mode === 'start')  { btn.textContent='スタート'; btn.onclick=startTimer; }
  if (mode === 'pause')  { btn.textContent='一時停止'; btn.onclick=pauseTimer; }
  if (mode === 'resume') { btn.textContent='再開';     btn.onclick=resumeTimer; }
}

// ===== 画面復帰時の同期 =====
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    const startTs = localStorage.getItem(STORE_KEY);
    if (startTs) {
      // 実行中だった → 同期
      running = true;
      clearInterval(intervalId);
      intervalId = setInterval(tick, 500);
      tick();
      // バナーを表示
      const banner = document.getElementById('syncBanner');
      banner.classList.add('show');
      setTimeout(()=> banner.classList.remove('show'), 2500);
    }
  }
});

// ===== 起動時の復元 =====
(function init() {
  buildList();
  const startTs = localStorage.getItem(STORE_KEY);
  const paused  = localStorage.getItem('morning_paused');

  if (startTs) {
    // 実行中に閉じた → 復元して再開
    running = true;
    setBtn('pause');
    intervalId = setInterval(tick, 500);
    tick();
    const banner = document.getElementById('syncBanner');
    banner.classList.add('show');
    setTimeout(()=> banner.classList.remove('show'), 2500);
  } else if (paused) {
    // 一時停止中に閉じた → 一時停止状態で復元
    const elapsed = parseInt(paused);
    const { step, rem, totalRem } = calcState(elapsed);
    applyState(step, rem, totalRem);
    setBtn('resume');
  } else {
    applyState(0, STEPS[0].dur*60, TOTAL_SECS);
    setBtn('start');
  }
})();
</script>
</body>
</html>
